# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI Automation with Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Start Selenium Grid
        run: docker-compose up -d

      - name: Wait for Selenium Grid to be ready
        run: |
          echo "Waiting for Selenium Grid..."
          timeout 60 bash -c 'until curl -sSf http://localhost:4444/wd/hub/status > /dev/null 2>&1; do sleep 2; done'
          echo "Selenium Grid is ready!"

      - name: Run Tests
        run: mvn test -Dconfig.mode=remote

      - name: Stop Selenium Grid
        if: always()
        run: docker-compose down

      - name: Publish Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
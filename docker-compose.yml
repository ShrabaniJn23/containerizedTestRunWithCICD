 
services:
  selenium-hub:
    image: selenium/hub:4.15.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      GRID_MAX_SESSION: 10
      GRID_BROWSER_TIMEOUT: 300
      GRID_TIMEOUT: 300
    networks:
      - selenium-network

  chrome:
    image: selenium/node-chrome:4.15.0
    container_name: selenium-chrome-node
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 5
      SE_NODE_SESSION_TIMEOUT: 300
      SE_SESSION_REQUEST_TIMEOUT: 300
      SE_NODE_ENABLE_VIDEO: true
    shm_size: 2gb
    ports:
      - "7900:7900"
    networks:
      - selenium-network

  chrome-video:
    image: selenium/video:ffmpeg-6.1-20240402
    container_name: chrome-video
    depends_on:
      - chrome
    environment:
      DISPLAY_CONTAINER_NAME: selenium-chrome-node
      SE_VIDEO_FILE_NAME: auto
      SE_VIDEO_FILE_NAME_PREFIX: chrome
      SE_VIDEO_POLL_INTERVAL: 1000
      SE_VIDEO_FRAME_RATE: 10
    volumes:
      - ./target/videos:/videos
    network_mode: service:chrome

  firefox:
    image: selenium/node-firefox:4.15.0
    container_name: selenium-firefox-node
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 5
      SE_NODE_SESSION_TIMEOUT: 300
      SE_SESSION_REQUEST_TIMEOUT: 300
      SE_NODE_ENABLE_VIDEO: true
    shm_size: 2gb
    ports:
      - "7901:7900"
    networks:
      - selenium-network

  firefox-video:
    image: selenium/video:ffmpeg-6.1-20240402
    container_name: firefox-video
    depends_on:
      - firefox
    environment:
      DISPLAY_CONTAINER_NAME: selenium-firefox-node
      SE_VIDEO_FILE_NAME: auto
      SE_VIDEO_FILE_NAME_PREFIX: firefox
      SE_VIDEO_POLL_INTERVAL: 1000
      SE_VIDEO_FRAME_RATE: 10
    volumes:
      - ./target/videos:/videos
    network_mode: service:firefox

  edge:
    image: selenium/node-edge:4.15.0
    container_name: selenium-edge-node
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 5
      SE_NODE_SESSION_TIMEOUT: 300
      SE_SESSION_REQUEST_TIMEOUT: 300
      SE_NODE_ENABLE_VIDEO: true
    shm_size: 2gb
    ports:
      - "7902:7900"
    networks:
      - selenium-network

  edge-video:
    image: selenium/video:ffmpeg-6.1-20240402
    container_name: edge-video
    depends_on:
      - edge
    environment:
      DISPLAY_CONTAINER_NAME: selenium-edge-node
      SE_VIDEO_FILE_NAME: auto
      SE_VIDEO_FILE_NAME_PREFIX: edge
      SE_VIDEO_POLL_INTERVAL: 1000
      SE_VIDEO_FRAME_RATE: 10
    volumes:
      - ./target/videos:/videos
    network_mode: service:edge

networks:
  selenium-network:
    driver: bridge

 
services:
  selenium-hub:
    image: selenium/hub:4.15.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      GRID_MAX_SESSION: 10
      GRID_BROWSER_TIMEOUT: 300
      GRID_TIMEOUT: 300
    networks:
      - selenium-network

  chrome:
    image: selenium/node-chrome:4.15.0
    container_name: selenium-chrome-node
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 5
      SE_NODE_SESSION_TIMEOUT: 300
      SE_SESSION_REQUEST_TIMEOUT: 300
      SE_DISPLAY_NUM: 100
      SE_VNC_PORT: 5900
    ports:
      - "7900:5900"  # VNC port for viewing browser
    networks:
      - selenium-network

  firefox:
    image: selenium/node-firefox:4.15.0
    container_name: selenium-firefox-node
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 5
      SE_NODE_SESSION_TIMEOUT: 300
      SE_SESSION_REQUEST_TIMEOUT: 300
      SE_DISPLAY_NUM: 101
      SE_VNC_PORT: 5901
    ports:
      - "7901:5901"  # VNC port for viewing browser
    networks:
      - selenium-network

  edge:
    image: selenium/node-edge:4.15.0
    container_name: selenium-edge-node
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 5
      SE_NODE_SESSION_TIMEOUT: 300
      SE_SESSION_REQUEST_TIMEOUT: 300
      SE_DISPLAY_NUM: 102
      SE_VNC_PORT: 5902
    ports:
      - "7902:5902"  # VNC port for viewing browser
    networks:
      - selenium-network

networks:
  selenium-network:
    driver: bridge
